name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          if ! head -1 index.html | grep -qi '<!doctype html>'; then
            echo "ERROR: Missing DOCTYPE"
            exit 1
          fi
          echo "HTML structure OK"

      - name: Check for broken links
        run: |
          for file in $(grep -oP '(?:src|href)="([^"]+)"' index.html | grep -oP '"[^"]*"' | tr -d '"' | grep -v '^http'); do
            if [ ! -f "$file" ] && [ ! -f "./$file" ]; then
              echo "ERROR: Referenced file not found: $file"
              exit 1
            fi
          done
          echo "All referenced files exist"

      - name: Check file sizes
        run: |
          find . -name '*.html' -o -name '*.css' -o -name '*.js' | while read f; do
            size=$(wc -c < "$f")
            if [ "$size" -gt 512000 ]; then
              echo "WARNING: $f is ${size} bytes (>500KB)"
            fi
          done
          echo "File sizes OK"

      - name: Validate JSON files
        run: |
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ERROR: Invalid JSON: $f"
              exit 1
            fi
          done
          echo "JSON files valid"

      - name: Accessibility audit
        run: |
          # Check for basic a11y requirements
          errors=0

          # lang attribute on html
          if ! grep -q 'lang=' index.html; then
            echo "ERROR: Missing lang attribute on <html>"
            errors=$((errors + 1))
          fi

          # viewport meta
          if ! grep -q 'viewport' index.html; then
            echo "ERROR: Missing viewport meta tag"
            errors=$((errors + 1))
          fi

          # alt text on images
          img_count=$(grep -c '<img' index.html 2>/dev/null || echo 0)
          alt_count=$(grep -c 'alt=' index.html 2>/dev/null || echo 0)
          if [ "$img_count" -gt "$alt_count" ]; then
            echo "WARNING: $((img_count - alt_count)) images missing alt text"
          fi

          # ARIA landmarks
          if ! grep -qE 'role=|<main|<nav|<header|<footer|aria-' index.html; then
            echo "WARNING: No ARIA landmarks or semantic elements found"
          fi

          if [ "$errors" -gt 0 ]; then
            echo "FAILED: $errors accessibility errors"
            exit 1
          fi
          echo "Accessibility checks passed"

      - name: CSS validation
        run: |
          # Check for common CSS issues
          for f in $(find . -name '*.css' -not -path './node_modules/*'); do
            # Check balanced braces
            opens=$(grep -o '{' "$f" | wc -l)
            closes=$(grep -o '}' "$f" | wc -l)
            if [ "$opens" -ne "$closes" ]; then
              echo "ERROR: Unbalanced braces in $f (opens: $opens, closes: $closes)"
              exit 1
            fi
          done
          echo "CSS validation passed"

      - name: JS syntax check
        run: |
          for f in $(find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*'); do
            if ! node --check "$f" 2>/dev/null; then
              echo "ERROR: Syntax error in $f"
              exit 1
            fi
          done
          echo "JS syntax check passed"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
